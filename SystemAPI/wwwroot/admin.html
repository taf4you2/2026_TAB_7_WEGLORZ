<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora - Hello World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            text-align: center;
            background-color: #1e293b;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        h1 {
            font-size: 4rem;
            color: #3b82f6;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.25rem;
            color: #94a3b8;
        }
        .logout-btn {
            margin-top: 2rem;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        .logout-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>
    <div id="app" style="display: none;">
        <div class="container">
            <h1>Hello World</h1>
            <p id="user-info">Zalogowano pomyślnie.</p>
            <button class="logout-btn" onclick="logout()">Wyloguj się</button>
        </div>
    </div>

    <script>
        // Funkcja pomocnicza do dekodowania JWT
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('jwt_token');
            window.location.href = 'admin-login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('jwt_token');
            
            if (!token) {
                window.location.href = 'admin-login.html';
                return;
            }

            const payload = parseJwt(token);
            if (!payload) {
                logout();
                return;
            }

            // Sprawdzenie roli
            const roleKey = 'http://schemas.microsoft.com/ws/2008/06/identity/claims/role';
            const role = payload.role || payload[roleKey];
            
            if (role !== 'admin') {
                alert('Brak uprawnień administratora!');
                window.location.href = 'kasjer.html'; // Przekierowanie kasjerów
                return;
            }

            // Wyświetlenie nazwy użytkownika
            const nameKey = 'http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name';
            const name = payload.unique_name || payload[nameKey] || payload.name || 'Administrator';
            document.getElementById('user-info').textContent = `Zalogowano jako administrator: ${name}`;
            
            // Pokazanie zawartości
            document.getElementById('app').style.display = 'block';
        });
    </script>
</body>
</html>
