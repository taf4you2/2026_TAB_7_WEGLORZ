<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — Stacja Narciarska</title>
    <style>
        body {
            min-height: 100vh; margin: 0;
            display: grid; place-items: center;
            font-family: Segoe UI, system-ui, sans-serif;
            background: #eef4fb; color: #172033;
        }
        .panel {
            width: min(420px, calc(100vw - 32px));
            background: #fff; border: 1px solid #dce4ee;
            border-radius: 8px; padding: 28px;
            box-shadow: 0 18px 42px rgba(23,32,51,0.14);
        }
        .logo { text-align: center; font-size: 40px; margin-bottom: 8px; }
        h1 { margin: 0 0 4px; font-size: 24px; text-align: center; }
        .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 22px; }
        label { display: block; margin: 14px 0 6px; font-size: 13px; font-weight: 700; }
        input {
            width: 100%; box-sizing: border-box;
            padding: 11px 12px; border: 1px solid #cbd7e4;
            border-radius: 8px; font: inherit;
        }
        input:focus { outline: 2px solid #1565c0; border-color: transparent; }
        .submit {
            width: 100%; margin-top: 18px; padding: 12px;
            border: 0; border-radius: 8px; background: #1565c0;
            color: #fff; font: inherit; font-weight: 700; cursor: pointer; font-size: 15px;
        }
        .submit:hover { background: #0d47a1; }
        .error {
            display: none; margin-top: 14px; padding: 10px 12px;
            border-left: 4px solid #c62828; background: #ffebee;
            color: #9f1b1b; font-size: 14px;
        }
        .hint {
            margin-top: 18px; padding: 10px 12px;
            background: #fff8e1; border-left: 4px solid #ff8f00;
            font-size: 13px; line-height: 1.45;
        }
        .links { margin-top: 16px; display: flex; justify-content: space-between; font-size: 13px; }
        .links a { color: #1565c0; font-weight: 600; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body data-wt-page="login">
    <main class="panel">
        <div class="logo">⛷️</div>
        <h1>Stacja Narciarska</h1>
        <div class="subtitle">Panel narciarza</div>

        <label for="email">E-mail</label>
        <input type="email" id="email" value="narciarz@example.com" autocomplete="username">

        <label for="password">Hasło</label>
        <input type="password" id="password" value="haslo123" autocomplete="current-password">

        <button class="submit" type="button" id="loginButton">Zaloguj się</button>
        <div class="error" id="error"></div>

        <div class="hint">
            Dane testowe: narciarz@example.com / haslo123
        </div>

        <div class="links">
            <a href="register.html">Zarejestruj się</a>
        </div>
    </main>

    <script>
        const emailInput  = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorBox    = document.getElementById('error');

        document.getElementById('loginButton').addEventListener('click', login);
        passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        async function login() {
            hideError();
            const email    = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) { showError('Podaj e-mail i hasło.'); return; }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role: 'narciarz' })
                });
                if (!res.ok) {
                    const d = await res.json().catch(() => ({}));
                    showError(d.message || 'Nieprawidłowy e-mail lub hasło.');
                    return;
                }
                const data = await res.json();
                localStorage.setItem('token',  data.token);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('role',   data.role);
                window.location.href = 'narciarz.html';
            } catch (e) {
                showError('Brak połączenia z API: ' + e.message);
            }
        }

        function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
        function hideError()    { errorBox.textContent = ''; errorBox.style.display = 'none'; }
    </script>
    <script src="walkthrough.js"></script>
</body>
</html>
