<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacja Narciarska — Logowanie</title>
  <style>
    :root {
      --primary: #1565C0;
      --primary-dark: #0D47A1;
      --primary-light: #E3F2FD;
      --accent: #FF6D00;
      --text: #212121;
      --text-muted: #757575;
      --border: #E0E0E0;
      --white: #FFFFFF;
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.25);
      --radius: 8px;
      --radius-lg: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0D47A1 0%, #1976D2 50%, #42A5F5 100%);
      position: relative;
      overflow: hidden;
    }

    /* Góry w tle */
    .mountains {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40vh;
      display: flex;
      align-items: flex-end;
      pointer-events: none;
    }
    .mountains svg { width: 100%; height: 100%; }

    /* Gwiazdki/śnieg */
    .snowflakes {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    .snowflake {
      position: absolute;
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      animation: fall linear infinite;
    }
    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(100vh) rotate(360deg); opacity: 0.2; }
    }

    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 420px;
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 10;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon { font-size: 52px; display: block; margin-bottom: 10px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: var(--primary); }
    .logo p  { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    /* Wybór roli */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }
    .role-btn {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 8px;
      cursor: pointer;
      background: white;
      text-align: center;
      transition: all 0.18s;
      font-family: inherit;
    }
    .role-btn:hover { border-color: var(--primary); }
    .role-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .role-btn .r-icon { font-size: 26px; display: block; margin-bottom: 5px; }
    .role-btn .r-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .role-btn.active .r-name { color: var(--primary); }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      margin-bottom: 16px;
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(21,101,192,0.15);
    }

    .btn-login {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.18s, transform 0.1s;
    }
    .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .guest-link {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .guest-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .guest-link a:hover { text-decoration: underline; }

    .demo-hint {
      margin-top: 20px;
      padding: 10px 14px;
      background: #FFF3E0;
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: 12px;
      color: #BF360C;
    }
    .demo-hint strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <!-- Góry w tle -->
  <div class="mountains">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,200 L0,140 L120,60 L200,110 L320,20 L440,90 L560,40 L680,100 L800,30 L920,80 L1040,10 L1160,70 L1280,50 L1440,90 L1440,200 Z"
            fill="rgba(255,255,255,0.08)"/>
      <path d="M0,200 L0,160 L180,90 L300,130 L480,50 L600,110 L760,60 L900,120 L1080,40 L1200,100 L1440,70 L1440,200 Z"
            fill="rgba(255,255,255,0.12)"/>
      <path d="M0,200 L0,180 L240,110 L400,150 L560,90 L720,140 L880,80 L1040,130 L1200,110 L1440,120 L1440,200 Z"
            fill="rgba(255,255,255,0.18)"/>
    </svg>
  </div>

  <!-- Śnieg -->
  <div class="snowflakes" id="snowflakes"></div>

  <div class="card">
    <div class="logo">
      <span class="logo-icon">⛷️</span>
      <h1>Stacja Narciarska</h1>
      <p>System Sprzedaży Biletów i Karnetów</p>
    </div>

    <div class="role-grid">
      <button class="role-btn active" onclick="selectRole('kasjer', this)">
        <span class="r-icon">🏷️</span>
        <span class="r-name">Kasjer</span>
      </button>
      <button class="role-btn" onclick="selectRole('narciarz', this)">
        <span class="r-icon">🎿</span>
        <span class="r-name">Narciarz</span>
      </button>
    </div>

    <label class="form-label">Login</label>
    <input class="form-input" type="email" id="loginInput" value="kasjer@stacja.pl" placeholder="e-mail lub login">

    <label class="form-label">Hasło</label>
    <input class="form-input" type="password" value="••••••••" placeholder="••••••••">

    <a href="kasjer.html" class="btn-login" id="loginBtn">Zaloguj się</a>

    <div class="divider">lub</div>

    <div class="guest-link">
      <a href="narciarz.html">Wejdź do portalu narciarza bez logowania →</a>
    </div>

    <div class="demo-hint">
      <strong>Mockup — dane demonstracyjne</strong>
      Kasjer: kasjer@stacja.pl | Hasło: dowolne
    </div>
  </div>

  <script>
    // Śnieżynki w tle
    const container = document.getElementById('snowflakes');
    const flakes = ['❄', '❅', '❆', '✻', '✼'];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'snowflake';
      el.textContent = flakes[Math.floor(Math.random() * flakes.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (6 + Math.random() * 8) + 's';
      el.style.animationDelay = (Math.random() * 8) + 's';
      el.style.fontSize = (10 + Math.random() * 16) + 'px';
      container.appendChild(el);
    }

    // Przełącznik roli
    function selectRole(role, el) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const btn = document.getElementById('loginBtn');
      const input = document.getElementById('loginInput');
      if (role === 'kasjer') {
        btn.href = 'kasjer.html';
        input.value = 'kasjer@stacja.pl';
      } else {
        btn.href = 'narciarz.html';
        input.value = 'narciarz@example.com';
      }
    }
  </script>
</body>
</html>
